run:
  name: "study-area-housing-run"
  output_dir: "../../outputs/study-area-housing-run"

boundary:
  boundary_type: "city"
  source: "file"
  path: "../../data/local/boundaries/study_area_boundary.geojson"
  boundary_id: "study-area-id"
  boundary_name: "Study Area"

sampling:
  method: "grid"
  spacing_meters: 400
  min_points: 24
  max_points: 120
  heading_mode: "cardinal"
  # Optional for heading_mode: "custom"
  # heading_values: [90, 270]
  stratify_by: "quadrant"

imagery:
  provider: "google_street_view"
  mode: "local_images"
  local_manifest_path: "../../data/local/manifests/study-area-reviewed-manifest.csv"
  image_width: 640
  image_height: 640
  field_of_view: 90
  pitch: 0

classification:
  categories_config: "../categories.yaml"
  target_categories:
    - "housing_units"

analysis:
  summary_method: "feature_centroid"
  comparison_mode: "within_run"
  feature_extractor: "pooled_descriptor_v1"
  representative_selection: "centroid_nearest"
  generate_composite: true
  composite_size: 256

reporting:
  write_markdown: true
  write_json: true
  write_csv: true
