run:
  name: "demo-city-housing"
  output_dir: "../outputs/demo-city-housing"

boundary:
  boundary_type: "city"
  source: "file"
  path: "../data/examples/boundaries/demo_city.geojson"
  boundary_id: "demo-city-001"
  boundary_name: "Demo City"

sampling:
  method: "grid"
  spacing_meters: 400
  min_points: 20
  max_points: 80
  heading_mode: "cardinal"
  stratify_by: "quadrant"

imagery:
  provider: "google_street_view"
  mode: "references_only"
  image_width: 640
  image_height: 640
  field_of_view: 90
  pitch: 0

classification:
  categories_config: "categories.yaml"
  target_categories:
    - "housing_units"
    - "arterial_roadways"
    - "shopping_centers"

analysis:
  summary_method: "feature_centroid"
  comparison_mode: "within_run"
  feature_extractor: "pooled_descriptor_v1"
  representative_selection: "centroid_nearest"
  generate_composite: false
  composite_size: 256

reporting:
  write_markdown: true
  write_json: true
  write_csv: true
